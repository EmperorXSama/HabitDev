services:
  habitdev:
    image: ${DOCKER_REGISTRY-}habitdev
    build:
      context: .
      dockerfile: HabitDev/Dockerfile
    ports:
      - "5000:8080"
      - "5001:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Otel__Endpoint=http://otel-collector:4317
      - ConnectionStrings__Database=Host=devhabit.postgres;Database=devhabit;Username=postgres;Password=postgres
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ASPNETCORE_Kestrel__Certificates__Default__Password=password123
    volumes:
      - ./https:/https:ro
    depends_on:
      otel-collector:
        condition: service_started
      devhabit.postgres:
        condition: service_healthy 

  devhabit.postgres:
    image: postgres:17.2
    environment:
      POSTGRES_DB: devhabit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./.containers/postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:                                      
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
  
  # ─── OTel Collector ──────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel/collector-config.yaml:/etc/otel/config.yaml
    ports:
      - "4317:4317"    # OTLP gRPC (your app sends here)
      - "4318:4318"    # OTLP HTTP
      - "8888:8888"    # Collector's own metrics (scraped by Prometheus)
    depends_on:
      - jaeger
      - prometheus
      - loki

  # ─── Jaeger (Traces) ─────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.60
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"  # Jaeger UI

  # ─── Prometheus (Metrics) ────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.0
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-remote-write-receiver'   # 👈 add this
    volumes:
      - ./otel/prometheus.yaml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  # ─── Loki (Logs) ─────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.1.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  # ─── Grafana (Unified UI) ────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    ports:
      - "3000:3000"    # Grafana UI
    volumes:
      - ./otel/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    depends_on:
      - prometheus
      - loki
      - jaeger
  